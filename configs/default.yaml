# =============================================================================
# XAI Emotion Recognition — Default Configuration
# =============================================================================
# All hyperparameters and paths in one place for reproducibility.
# Override via CLI args or environment variables as needed.

# --- Paths ---
paths:
  data_dir: "dataset"
  affectnet_dir: "dataset"
  fer2013_dir: "FER"
  rafdb_dir: "data/RAF-DB"
  checkpoint_dir: "checkpoints"
  output_dir: "outputs"

# --- Face Detection (MediaPipe) ---
face_detection:
  use_yolo: true                  # Use YOLOv8n for tight face-only crops
  static_image_mode: true
  max_num_faces: 1
  min_detection_confidence: 0.5
  refine_landmarks: true
  face_crop_padding: 0.05         # 5% padding (tight face-only crop)

# --- AU Feature Extraction ---
au_extraction:
  # Thresholds for AU activation (calibrated on AffectNet dataset)
  # All distances normalized by Inter-Ocular Distance (IOD)
  normalization: "iod"            # Inter-ocular distance normalization
  thresholds:
    au1_inner_brow_raise: 0.42
    au2_outer_brow_raise: 0.40
    au4_brow_furrow: 0.55
    au5_eye_wide: 0.16
    au6_cheek_raise: 0.16
    au12_lip_corner_pull: 1.10
    au14_dimpler_asymmetry: 0.04
    au15_lip_corner_depress: 0.05
    au17_chin_raise: 0.35
    au24_lip_press: 0.04
    au25_lips_part: 0.08
    au26_jaw_drop: 0.65

# --- Emotion Classifier ---
classifier:
  model_name: "resnet18"          # Options: "poster_v2", "resnet50_cbam", "resnet18", "efficientnet_b4", "vit"
  num_classes: 8                  # AffectNet: 8 classes
  image_size: 224
  pretrained: true

# --- Training ---
training:
  epochs: 50
  batch_size: 64                  # Auto-adjusted per model for RTX 4060 8GB VRAM
  learning_rate: 0.0001
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  label_smoothing: 0.1
  use_amp: true                   # Mixed precision for RTX 4060
  gradient_accumulation_steps: 1
  num_workers: 0                  # 0 recommended on Windows
  pin_memory: true
  early_stopping_patience: 10

# --- Data Augmentation ---
augmentation:
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  random_erasing_prob: 0.25
  normalize:
    mean: [0.485, 0.456, 0.406]   # ImageNet normalization
    std: [0.229, 0.224, 0.225]

# --- Attention (Grad-CAM) ---
attention:
  method: "grad_cam"              # Options: "grad_cam", "grad_eclip" (legacy)
  target_layer: "last"
  heatmap_threshold: 0.3
  colormap: "jet"
  alpha: 0.4
  add_colorbar: true              # Publication-quality colorbar (Low → High)

# --- Region Parser ---
region_parser:
  regions:
    - "forehead"
    - "left_eyebrow"
    - "right_eyebrow"
    - "left_eye"
    - "right_eye"
    - "nose"
    - "left_cheek"
    - "right_cheek"
    - "mouth"
    - "chin"
    - "jaw"

# --- Explanation Generator (Qwen-0.5B) ---
explainer:
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  quantization: "none"            # Small enough to fit without quantization
  max_new_tokens: 150
  temperature: 0.3
  do_sample: false
  device: "cuda"

# --- Pipeline ---
pipeline:
  sequential_loading: true        # Unload classifier before loading VLM
  save_visualizations: true
  save_explanations: true
  output_format: "json"           # Output format: "json" or "text"

# --- Emotion Labels ---
emotion_labels:
  affectnet: ["anger", "contempt", "disgust", "fear", "happy", "neutral", "sad", "surprise"]
  fer2013: ["angry", "disgust", "fear", "happy", "sad", "surprise", "neutral"]
  rafdb: ["surprise", "fear", "disgust", "happy", "sad", "angry", "neutral"]
